<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tank CTF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Arial Black',sans-serif;}
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);z-index:200;}
#lobby h1{font-size:clamp(28px,6vw,52px);color:#ffd700;text-shadow:0 0 20px #ffd700,3px 3px 0 #000;letter-spacing:2px;text-align:center;}
#lobby p{color:#aaa;font-size:13px;text-align:center;max-width:320px;font-family:Arial,sans-serif;}
.lbox{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.15);border-radius:16px;padding:18px 24px;display:flex;flex-direction:column;gap:10px;width:min(300px,90vw);}
.lbox h2{color:#fff;font-size:16px;text-align:center;}
.lbtn{padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:900;font-family:'Arial Black',sans-serif;transition:transform 0.1s;}
.lbtn:active{transform:scale(0.96);}
.bSP{background:linear-gradient(135deg,#44cc44,#226622);color:#fff;}
.bHost{background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff;}
.bJoin{background:linear-gradient(135deg,#4488ff,#0044cc);color:#fff;}
.bDis{opacity:0.5;pointer-events:none;}
.linput{padding:11px;border-radius:10px;border:2px solid #444;background:#111;color:#fff;font-size:18px;text-align:center;letter-spacing:4px;font-family:'Arial Black',sans-serif;outline:none;text-transform:uppercase;}
.linput:focus{border-color:#ffd700;}
.div{display:flex;align-items:center;gap:10px;color:#555;font-size:12px;}
.div::before,.div::after{content:'';flex:1;height:1px;background:#333;}
#slots{display:flex;gap:8px;justify-content:center;}
.slotb{width:58px;height:58px;border-radius:10px;border:3px solid #555;background:#222;color:#fff;font-size:10px;font-weight:900;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.slotb.r{border-color:#ff4444;}.slotb.b{border-color:#4488ff;}
.slotb.sel.r{background:#ff4444;}.slotb.sel.b{background:#4488ff;}
#smsg{color:#ffd700;font-size:13px;text-align:center;min-height:18px;font-family:Arial,sans-serif;}
#wait{position:fixed;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;gap:12px;background:linear-gradient(135deg,#1a1a2e,#16213e);z-index:190;}
#wait.show{display:flex;}
#wcode{font-size:clamp(32px,7vw,64px);color:#ffd700;letter-spacing:10px;text-shadow:0 0 20px #ffd700,3px 3px 0 #000;}
#wait h2{color:#fff;font-size:18px;}#wait p{color:#aaa;font-size:13px;font-family:Arial,sans-serif;text-align:center;}
#pslots{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.ps{width:72px;height:72px;border-radius:12px;border:3px solid #444;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:900;color:#555;}
.ps.r{border-color:#ff4444;color:#ff4444;background:rgba(255,68,68,0.15);}
.ps.b{border-color:#4488ff;color:#4488ff;background:rgba(68,136,255,0.15);}
.psi{font-size:24px;}
#sbtn{padding:13px 40px;border-radius:50px;border:none;cursor:pointer;font-size:17px;font-weight:900;font-family:'Arial Black',sans-serif;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;display:none;}
#gw{position:relative;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;}
#gc{display:block;touch-action:none;}
#cc{position:absolute;top:0;left:0;pointer-events:none;}
.pbtn{position:absolute;width:100px;height:100px;border-radius:50%;border:5px solid rgba(255,255,255,0.3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:30px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.5);outline:none;}
#mb.r{background:radial-gradient(circle,#ff6666,#cc0000);}
#mb.b{background:radial-gradient(circle,#6699ff,#0044cc);}
.abar{position:absolute;display:none;flex-direction:column;gap:4px;z-index:10;}
.ab{width:14px;height:28px;border-radius:7px;background:#ffd700;border:2px solid #b8860b;}
.ab.e{background:#333;border-color:#555;}
#ind{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#ffd700;padding:8px 20px;border-radius:20px;font-size:13px;z-index:20;display:none;pointer-events:none;}
#ws{position:absolute;inset:0;display:none;justify-content:center;align-items:center;flex-direction:column;background:rgba(0,0,0,0.75);z-index:100;}
#ws.show{display:flex;}
#wt{font-size:clamp(28px,7vw,64px);font-weight:900;color:#ffd700;text-shadow:0 0 30px #ffd700,4px 4px 0 #000;animation:pulse 0.5s infinite alternate;text-align:center;padding:0 20px;}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
#pab{margin-top:20px;padding:13px 40px;font-size:20px;font-weight:900;font-family:'Arial Black',sans-serif;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:50px;cursor:pointer;}
</style>
</head>
<body>
<div id="lobby">
  <h1>🪖 TANK CTF</h1>
  <p>2v2 — Capture the enemy flag!</p>
  <div class="lbox"><h2>Single Player</h2><button class="lbtn bSP" onclick="startSP()">🤖 Play vs Bots</button></div>
  <div class="div">or multiplayer</div>
  <div class="lbox"><h2>Host a Game</h2><button class="lbtn bHost" onclick="hostGame()">🎮 Create Room</button></div>
  <div class="div">or</div>
  <div class="lbox">
    <h2>Join a Game</h2>
    <input class="linput" id="jcode" maxlength="6" placeholder="ROOM CODE" oninput="this.value=this.value.toUpperCase()">
    <div id="slots">
      <div class="slotb r" onclick="pickSlot(0)" id="s0"><span>🔴</span>P1</div>
      <div class="slotb r" onclick="pickSlot(1)" id="s1"><span>🔴</span>P2</div>
      <div class="slotb b" onclick="pickSlot(2)" id="s2"><span>🔵</span>P3</div>
      <div class="slotb b" onclick="pickSlot(3)" id="s3"><span>🔵</span>P4</div>
    </div>
    <button class="lbtn bJoin bDis" id="jbtn" onclick="joinGame()">🚀 Join Room</button>
  </div>
  <div id="smsg"></div>
</div>
<div id="wait">
  <h2>🎮 Room Code</h2>
  <div id="wcode">------</div>
  <p>Share this code with friends!</p>
  <div id="pslots">
    <div class="ps" id="ps0"><span class="psi">🔴</span>P1<br>waiting</div>
    <div class="ps" id="ps1"><span class="psi">🔴</span>P2<br>waiting</div>
    <div class="ps" id="ps2"><span class="psi">🔵</span>P3<br>waiting</div>
    <div class="ps" id="ps3"><span class="psi">🔵</span>P4<br>waiting</div>
  </div>
  <p id="wmsg">Waiting for players...</p>
  <button id="sbtn" onclick="doStart()">▶ START GAME</button>
</div>
<div id="gw" style="display:none">
  <canvas id="gc"></canvas>
  <canvas id="cc"></canvas>
  <div class="pbtn" id="mb">🎯</div>
  <div class="abar" id="ma"></div>
  <div id="ind"></div>
  <div id="ws"><div id="wt">🏆</div><button id="pab" onclick="location.reload()">Play Again</button></div>
</div>

<script>
// ══════════════ CONFIG ══════════════
const SRV = 'wss://tank-ctf-server.onrender.com';
const ICE = {iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

// ══════════════ CONSTANTS ══════════════
const ARENA   = {x:90,y:30,w:620,h:390};
const MAX_AMMO= 5;
const RELOAD  = 2000;
const CAGE_T  = 10;
const ROT_SPD = 3.53;
const MOV_SPD = 1.6;
const BUL_SPD = 7;
const TANK_R  = 14;
const BUL_R   = 3;
const SPAWNS  = [[{x:130,y:110},{x:130,y:340}],[{x:670,y:110},{x:670,y:340}]];
const FLAGPOS = [{x:105,y:225},{x:695,y:225}];
const CAPZONE = [{x:58,y:175,w:80,h:100},{x:662,y:175,w:80,h:100}];
const WALLS   = [
  {x:370,y:60,w:18,h:80},{x:370,y:310,w:18,h:80},
  {x:200,y:180,w:60,h:14},{x:200,y:180,w:14,h:50},
  {x:540,y:180,w:60,h:14},{x:586,y:180,w:14,h:50},
  {x:200,y:290,w:14,h:50},{x:200,y:326,w:60,h:14},
  {x:540,y:326,w:60,h:14},{x:586,y:290,w:14,h:50},
  {x:290,y:150,w:14,h:14},{x:310,y:165,w:14,h:14},
  {x:460,y:260,w:14,h:14},{x:480,y:275,w:14,h:14},
];

// ══════════════ CANVAS ══════════════
const GC=document.getElementById('gc'),ctx=GC.getContext('2d');
const CC=document.getElementById('cc'),cctx=CC.getContext('2d');
let W,H,SC;
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight,asp=800/450;
  if(vw/vh>asp){H=vh;W=H*asp;}else{W=vw;H=W/asp;}
  GC.width=W;GC.height=H;CC.width=vw;CC.height=vh;SC=W/800;
}

// ══════════════ GAME STATE ══════════════
let G=null,mySlot=-1,isSP=false,isHost=false,started=false;
let myHold=false,holding=[false,false,false,false],rotDir=[1,1,1,1];

function mkTank(id,team){
  const sp=SPAWNS[team][id%2];
  return{id,team,x:sp.x,y:sp.y,angle:team===0?45:135,ammo:MAX_AMMO,alive:true,caging:false,cageT:0,hasFlag:false};
}
function newG(){
  holding=[false,false,false,false];rotDir=[1,1,1,1];
  return{
    tanks:[mkTank(0,0),mkTank(1,0),mkTank(2,1),mkTank(3,1)],
    bullets:[],
    flags:[{team:0,x:FLAGPOS[0].x,y:FLAGPOS[0].y,held:false,heldBy:-1},
           {team:1,x:FLAGPOS[1].x,y:FLAGPOS[1].y,held:false,heldBy:-1}],
    confetti:[],over:false,
  };
}

// ══════════════ PHYSICS ══════════════
function cR(cx,cy,cr,rx,ry,rw,rh){const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));return(cx-nx)**2+(cy-ny)**2<cr*cr;}
function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function inR(px,py,r){return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h;}

function moveT(t,nx,ny){
  nx=Math.max(ARENA.x+TANK_R,Math.min(ARENA.x+ARENA.w-TANK_R,nx));
  ny=Math.max(ARENA.y+TANK_R,Math.min(ARENA.y+ARENA.h-TANK_R,ny));
  let bx=false,by=false;
  for(const w of WALLS){if(cR(nx,t.y,TANK_R,w.x,w.y,w.w,w.h))bx=true;if(cR(t.x,ny,TANK_R,w.x,w.y,w.w,w.h))by=true;}
  if(!bx&&!by){t.x=nx;t.y=ny;}else if(!bx){t.x=t.x+(nx-t.x)*0.5;}else if(!by){t.y=t.y+(ny-t.y)*0.5;}
  G.tanks.forEach(o=>{
    if(o.id===t.id||!o.alive||o.caging)return;
    const dx=t.x-o.x,dy=t.y-o.y,dist=Math.sqrt(dx*dx+dy*dy),mn=TANK_R*2;
    if(dist<mn&&dist>0){const p=(mn-dist)/2;
      t.x+=(dx/dist)*p;t.y+=(dy/dist)*p;o.x-=(dx/dist)*p;o.y-=(dy/dist)*p;
      t.x=Math.max(ARENA.x+TANK_R,Math.min(ARENA.x+ARENA.w-TANK_R,t.x));t.y=Math.max(ARENA.y+TANK_R,Math.min(ARENA.y+ARENA.h-TANK_R,t.y));
      o.x=Math.max(ARENA.x+TANK_R,Math.min(ARENA.x+ARENA.w-TANK_R,o.x));o.y=Math.max(ARENA.y+TANK_R,Math.min(ARENA.y+ARENA.h-TANK_R,o.y));}
  });
}

function shootBullet(slot){
  const t=G.tanks[slot];if(!t||!t.alive||t.caging||t.ammo<=0)return;
  t.ammo--;updateAmmo();
  const rad=t.angle*Math.PI/180;
  G.bullets.push({x:t.x+Math.cos(rad)*(TANK_R+2),y:t.y+Math.sin(rad)*(TANK_R+2),vx:Math.cos(rad)*BUL_SPD,vy:Math.sin(rad)*BUL_SPD,team:t.team,life:180});
  setTimeout(()=>{if(t.ammo<MAX_AMMO){t.ammo++;updateAmmo();}},RELOAD);
}

function killT(t){
  G.flags.forEach(f=>{if(f.heldBy===t.id){f.held=false;f.heldBy=-1;t.hasFlag=false;f.x=FLAGPOS[f.team].x;f.y=FLAGPOS[f.team].y;}});
  holding[t.id]=false;t.alive=false;t.caging=true;t.cageT=CAGE_T;rotDir[t.id]=1;
  const sp=SPAWNS[t.team][t.id%2];t.x=sp.x;t.y=sp.y;t.angle=t.team===0?45:135;
}

function winGame(team){
  if(!G||G.over)return;G.over=true;
  document.getElementById('wt').textContent=(team===0?'🔴 RED':'🔵 BLUE')+' TEAM WINS! 🏆';
  document.getElementById('wt').style.color=team===0?'#ff6666':'#66aaff';
  document.getElementById('ws').classList.add('show');
  for(let i=0;i<200;i++)G.confetti.push({x:Math.random()*CC.width,y:-10,vx:(Math.random()-0.5)*7,vy:Math.random()*5+2,color:['#ff4444','#4488ff','#ffd700','#44ff88','#ff88ff'][Math.floor(Math.random()*5)],w:Math.random()*12+5,h:Math.random()*6+4,rot:Math.random()*360,rv:(Math.random()-0.5)*10,life:200});
}

// Full physics tick (runs on host + singleplayer)
function tick(dt){
  if(!G||G.over)return;
  G.tanks.forEach((t,i)=>{
    if(!holding[i])t.angle=(t.angle+ROT_SPD*rotDir[i]*dt+360)%360;
    if(t.caging){t.cageT-=dt/60;if(t.cageT<=0){t.caging=false;t.alive=true;}}
    if(!t.alive)return;
    if(holding[i]){const rad=t.angle*Math.PI/180;moveT(t,t.x+Math.cos(rad)*MOV_SPD*dt,t.y+Math.sin(rad)*MOV_SPD*dt);}
    G.flags.forEach(f=>{if(f.team===t.team||f.held)return;if(d2(t,f)<(TANK_R+14)**2){f.held=true;f.heldBy=t.id;t.hasFlag=true;}});
    if(t.hasFlag&&inR(t.x,t.y,CAPZONE[t.team]))winGame(t.team);
  });
  G.flags.forEach(f=>{if(f.held&&f.heldBy>=0){const c=G.tanks[f.heldBy];if(c&&c.alive&&!c.caging){f.x=c.x;f.y=c.y+12;}else{f.held=false;if(c)c.hasFlag=false;f.heldBy=-1;}}});
  G.bullets=G.bullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h)return false;
    for(const w of WALLS)if(cR(b.x,b.y,BUL_R,w.x,w.y,w.w,w.h))return false;
    for(const t of G.tanks){if(!t.alive||t.caging||t.team===b.team)continue;if(d2(b,t)<(TANK_R+BUL_R)**2){killT(t);return false;}}
    return true;
  });
}

// ══════════════ BOT AI ══════════════
const botS={1:{t:0,ht:0},2:{t:0,ht:0},3:{t:0,ht:0}};
function botTick(){
  [1,2,3].forEach(i=>{
    const t=G.tanks[i],bs=botS[i];
    if(!t||!t.alive||t.caging){holding[i]=false;return;}
    bs.t-=1/60;bs.ht-=1/60;
    if(bs.ht<=0&&holding[i]){holding[i]=false;rotDir[i]*=-1;}
    G.tanks.filter(e=>e.team!==t.team&&e.alive&&!e.caging).forEach(e=>{
      const ea=Math.atan2(e.y-t.y,e.x-t.x)*180/Math.PI;
      let df=ea-t.angle;while(df>180)df-=360;while(df<-180)df+=360;
      if(Math.abs(df)<18&&d2(t,e)<210**2&&t.ammo>0&&!holding[i])shootBullet(i);
    });
    if(bs.t<=0){
      bs.t=0.3+Math.random()*0.4;
      const ef=G.flags.find(f=>f.team!==t.team&&!f.held);
      let tx=400,ty=225;
      if(t.hasFlag){tx=CAPZONE[t.team].x+40;ty=CAPZONE[t.team].y+50;}
      else if(ef){tx=ef.x;ty=ef.y;}
      else{const en=G.tanks.filter(e=>e.team!==t.team&&e.alive);if(en.length){tx=en[0].x;ty=en[0].y;}}
      const ta=Math.atan2(ty-t.y,tx-t.x)*180/Math.PI;
      let df=ta-t.angle;while(df>180)df-=360;while(df<-180)df+=360;
      if(Math.abs(df)<28&&Math.sqrt((tx-t.x)**2+(ty-t.y)**2)>TANK_R*2&&!holding[i]){
        holding[i]=true;bs.ht=0.2+Math.random()*0.3;shootBullet(i);
      }
    }
  });
}

// ══════════════ INPUT ══════════════
const ptrs={};
function onPress(){
  if(navigator.vibrate)navigator.vibrate(0);
  if(!G||G.over)return;
  const t=G.tanks[mySlot];
  if(!t||!t.alive||t.caging||myHold)return;
  myHold=true;holding[mySlot]=true;
  shootBullet(mySlot);
  if(!isSP){
    // Send input to host via WebRTC
    rtcSend(mySlot===0?null:0,{type:'input',slot:mySlot,action:'down',angle:t.angle});
    if(isHost)broadcastState(); // host processes immediately
  }
}
function onRelease(){
  if(!myHold)return;
  myHold=false;holding[mySlot]=false;rotDir[mySlot]*=-1;
  if(!isSP){
    rtcSend(mySlot===0?null:0,{type:'input',slot:mySlot,action:'up'});
    if(isHost)broadcastState();
  }
}

GC.addEventListener('pointerdown',e=>{e.preventDefault();ptrs[e.pointerId]=1;GC.setPointerCapture(e.pointerId);onPress();},{passive:false});
GC.addEventListener('pointerup',e=>{e.preventDefault();delete ptrs[e.pointerId];onRelease();},{passive:false});
GC.addEventListener('pointercancel',e=>{delete ptrs[e.pointerId];onRelease();});
const MB=document.getElementById('mb');
MB.addEventListener('pointerdown',e=>{e.preventDefault();MB.setPointerCapture(e.pointerId);onPress();});
MB.addEventListener('pointerup',e=>{e.preventDefault();onRelease();});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&!e.repeat)onPress();});
document.addEventListener('keyup',e=>{if(e.code==='Space')onRelease();});

// ══════════════ WEBRTC ══════════════
// peers[slot] = RTCPeerConnection
// channels[slot] = RTCDataChannel
const peers={}, channels={};
let sigSocket=null, myCode='';

function sigSend(obj){if(sigSocket&&sigSocket.readyState===1)sigSocket.send(JSON.stringify(obj));}

// Send data to a specific peer (or all if slot=null)
function rtcSend(toSlot,data){
  const msg=JSON.stringify(data);
  if(toSlot===null){
    Object.values(channels).forEach(ch=>{if(ch.readyState==='open')ch.send(msg);});
  } else {
    const ch=channels[toSlot];if(ch&&ch.readyState==='open')ch.send(msg);
  }
}

// Host broadcasts full game state to all clients
function broadcastState(){
  if(!G)return;
  const state={
    type:'state',
    tanks:G.tanks.map((t,i)=>({x:t.x,y:t.y,angle:t.angle,rotDir:rotDir[i],holding:holding[i],alive:t.alive,caging:t.caging,cageT:t.cageT,hasFlag:t.hasFlag,ammo:t.ammo})),
    flags:G.flags.map(f=>({x:f.x,y:f.y,held:f.held,heldBy:f.heldBy,team:f.team})),
    bullets:G.bullets.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,team:b.team,life:b.life})),
    over:G.over,winner:G.over?(G.tanks.find(t=>t.hasFlag)?.team??-1):-1,
  };
  rtcSend(null,state);
}

// Client applies state from host
function applyState(msg){
  if(!G)return;
  msg.tanks.forEach((td,i)=>{
    const t=G.tanks[i];if(!t)return;
    holding[i]=td.holding;rotDir[i]=td.rotDir;
    if(i===mySlot){
      // My tank: trust local position, just accept game state
      const dist=Math.sqrt((t.x-td.x)**2+(t.y-td.y)**2);
      if(dist>100){t.x=td.x;t.y=td.y;} // only snap if very far off
      t.alive=td.alive;t.caging=td.caging;t.cageT=td.cageT;t.hasFlag=td.hasFlag;t.ammo=td.ammo;
    } else {
      // Remote tanks: smooth interpolation
      const dist=Math.sqrt((t.x-td.x)**2+(t.y-td.y)**2);
      if(dist>150){t.x=td.x;t.y=td.y;}
      else if(dist>3){t.x=t.x*0.6+td.x*0.4;t.y=t.y*0.6+td.y*0.4;}
      t.angle=td.angle;t.alive=td.alive;t.caging=td.caging;t.cageT=td.cageT;t.hasFlag=td.hasFlag;t.ammo=td.ammo;
    }
  });
  msg.flags.forEach((fd,i)=>{G.flags[i].held=fd.held;G.flags[i].heldBy=fd.heldBy;G.flags[i].team=fd.team;if(!fd.held){G.flags[i].x=fd.x;G.flags[i].y=fd.y;}});
  // Sync bullets
  if(Math.abs(G.bullets.length-msg.bullets.length)>1)G.bullets=msg.bullets.map(b=>({...b}));
  if(msg.over&&!G.over)winGame(msg.winner);
  updateAmmo();
}

// Handle incoming RTC message
function onRTCMsg(slot,data){
  const msg=JSON.parse(data);
  if(msg.type==='input'&&isHost){
    // Host receives input from client
    const t=G.tanks[msg.slot];if(!t)return;
    if(msg.action==='down'){
      holding[msg.slot]=true;
      if(msg.angle!==undefined)t.angle=msg.angle;
      shootBullet(msg.slot);
    } else {
      holding[msg.slot]=false;
      rotDir[msg.slot]*=-1;
    }
  } else if(msg.type==='state'&&!isHost){
    applyState(msg);
  }
}

// Create peer connection for a slot
function createPeer(slot, initiator){
  const pc=new RTCPeerConnection(ICE);
  peers[slot]=pc;

  // Handle ICE candidates — send via signaling server
  pc.onicecandidate=e=>{
    if(e.candidate)sigSend({type:'signal',to:slot,code:myCode,data:{candidate:e.candidate}});
  };

  if(initiator){
    // Create data channel (host/initiator creates it)
    const ch=pc.createDataChannel('game',{ordered:false,maxRetransmits:0});
    channels[slot]=ch;
    ch.onopen=()=>console.log(`Channel open with P${slot}`);
    ch.onmessage=e=>onRTCMsg(slot,e.data);
    ch.onerror=e=>console.error('Channel error',e);

    // Create offer
    pc.createOffer().then(offer=>{
      pc.setLocalDescription(offer);
      sigSend({type:'signal',to:slot,code:myCode,data:{offer}});
    });
  } else {
    // Wait for data channel (client receives it)
    pc.ondatachannel=e=>{
      const ch=e.channel;
      channels[slot]=ch;
      ch.onopen=()=>console.log(`Channel open with P${slot}`);
      ch.onmessage=e=>onRTCMsg(slot,e.data);
    };
  }
  return pc;
}

// Handle signaling message
function onSignal(msg){
  const slot=msg.from;
  if(msg.offer){
    if(!peers[slot])createPeer(slot,false);
    peers[slot].setRemoteDescription(msg.offer).then(()=>{
      peers[slot].createAnswer().then(ans=>{
        peers[slot].setLocalDescription(ans);
        sigSend({type:'signal',to:slot,code:myCode,data:{answer:ans}});
      });
    });
  } else if(msg.answer){
    peers[slot]?.setRemoteDescription(msg.answer);
  } else if(msg.candidate){
    peers[slot]?.addIceCandidate(msg.candidate);
  }
}

// ══════════════ LOBBY ══════════════
function setMsg(m,c='#ffd700'){const e=document.getElementById('smsg');e.textContent=m;e.style.color=c;}
function pickSlot(s){
  mySlot=s;
  [0,1,2,3].forEach(i=>document.getElementById(`s${i}`).classList.remove('sel'));
  document.getElementById(`s${s}`).classList.add('sel');
  document.getElementById('jbtn').classList.remove('bDis');
}
function fillSlot(s){
  const e=document.getElementById(`ps${s}`);
  e.classList.add(s<2?'r':'b');
  e.innerHTML=`<span class="psi">${s<2?'🔴':'🔵'}</span>P${s+1}<br>✅`;
}

function connectSig(cb){
  setMsg('Connecting...');
  sigSocket=new WebSocket(SRV);
  sigSocket.onopen=()=>{setMsg('Connected ✅');cb();};
  sigSocket.onerror=()=>setMsg('Failed ❌','#ff4444');
  sigSocket.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='hosted'){mySlot=0;myCode=msg.code;isHost=true;document.getElementById('lobby').style.display='none';document.getElementById('wait').classList.add('show');document.getElementById('wcode').textContent=msg.code;fillSlot(0);}
    else if(msg.type==='joined'){mySlot=msg.slot;myCode=msg.code;document.getElementById('lobby').style.display='none';document.getElementById('wait').classList.add('show');document.getElementById('wcode').textContent=msg.code;fillSlot(msg.slot);}
    else if(msg.type==='players'){msg.slots.forEach(s=>fillSlot(s));document.getElementById('wmsg').textContent=`${msg.slots.length}/4 connected...`;if(msg.slots.length>=2&&mySlot===0)document.getElementById('sbtn').style.display='block';}
    else if(msg.type==='existing'){
      // I just joined — initiate WebRTC with existing players
      // If I'm not host, connect to host (slot 0)
      msg.slots.forEach(s=>{if(s!==mySlot)createPeer(s,mySlot>s);});
    }
    else if(msg.type==='start'){if(!started)beginGame();}
    else if(msg.type==='signal'){onSignal(msg);}
    else if(msg.type==='error'){setMsg(msg.msg,'#ff4444');}
  };
}

function hostGame(){connectSig(()=>sigSocket.send(JSON.stringify({type:'host'})));}
function joinGame(){
  const code=document.getElementById('jcode').value.trim().toUpperCase();
  if(code.length!==6){setMsg('Enter 6-letter code!','#ff4444');return;}
  if(mySlot<0){setMsg('Pick your slot!','#ff4444');return;}
  connectSig(()=>sigSocket.send(JSON.stringify({type:'join',code,slot:mySlot})));
}
function doStart(){
  sigSocket.send(JSON.stringify({type:'start'}));
  // Host creates WebRTC connections to all clients
  Object.keys(peers).length===0 && document.querySelectorAll('.ps.r,.ps.b').forEach((_,i)=>{
    if(i!==0)createPeer(i,true);
  });
}
function startSP(){isSP=true;mySlot=0;isHost=true;document.getElementById('lobby').style.display='none';beginGame();}

// ══════════════ GAME START ══════════════
function beginGame(){
  started=true;
  document.getElementById('wait').classList.remove('show');
  document.getElementById('gw').style.display='flex';
  resize();window.addEventListener('resize',resize);
  G=newG();
  const btn=document.getElementById('mb'),ammo=document.getElementById('ma');
  btn.style.display='flex';ammo.style.display='flex';
  btn.className='pbtn '+(mySlot<2?'r':'b');
  if(mySlot===0){btn.style.top='10px';btn.style.left='10px';ammo.style.top='120px';ammo.style.left='10px';}
  if(mySlot===1){btn.style.bottom='10px';btn.style.left='10px';ammo.style.bottom='120px';ammo.style.left='10px';}
  if(mySlot===2){btn.style.top='10px';btn.style.right='10px';ammo.style.top='120px';ammo.style.right='10px';ammo.style.alignItems='flex-end';}
  if(mySlot===3){btn.style.bottom='10px';btn.style.right='10px';ammo.style.bottom='120px';ammo.style.right='10px';ammo.style.alignItems='flex-end';}
  const ind=document.getElementById('ind');ind.style.display='block';
  ind.textContent=`You are ${mySlot<2?'🔴 RED':'🔵 BLUE'} — P${mySlot+1}`;
  setTimeout(()=>ind.style.display='none',3000);
  updateAmmo();
  requestAnimationFrame(loop);
}

function updateAmmo(){
  const bar=document.getElementById('ma');bar.innerHTML='';
  const t=G?.tanks[mySlot];if(!t)return;
  for(let i=0;i<MAX_AMMO;i++){const b=document.createElement('div');b.className='ab'+(i<t.ammo?'':' e');bar.appendChild(b);}
}

// ══════════════ MAIN LOOP ══════════════
let lastT=0,stateTimer=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/16.667,3);lastT=ts;
  if(G&&!G.over){
    if(isSP){
      botTick();tick(dt);
    } else if(isHost){
      // Host runs full physics
      tick(dt);
      // Broadcast state to all clients ~60 times/sec via WebRTC
      stateTimer+=dt;
      if(stateTimer>=1){stateTimer=0;broadcastState();}
    } else {
      // Client: predict my tank locally, animate others from received state
      const t=G.tanks[mySlot];
      if(t&&t.alive&&!t.caging){
        if(!myHold)t.angle=(t.angle+ROT_SPD*rotDir[mySlot]*dt+360)%360;
        if(myHold){const rad=t.angle*Math.PI/180;moveT(t,t.x+Math.cos(rad)*MOV_SPD*dt,t.y+Math.sin(rad)*MOV_SPD*dt);}
      }
      // Animate remote tanks rotation
      G.tanks.forEach((t,i)=>{if(i===mySlot||!t.alive||t.caging)return;if(!holding[i])t.angle=(t.angle+ROT_SPD*rotDir[i]*dt+360)%360;});
      // Animate bullets
      G.bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;});
      G.bullets=G.bullets.filter(b=>b.x>=ARENA.x&&b.x<=ARENA.x+ARENA.w&&b.y>=ARENA.y&&b.y<=ARENA.y+ARENA.h);
      G.flags.forEach(f=>{if(!f.held||f.heldBy<0)return;const c=G.tanks[f.heldBy];if(c&&c.alive&&!c.caging){f.x=c.x;f.y=c.y+12;}});
    }
    G.confetti.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;p.rot+=p.rv;});
    G.confetti=G.confetti.filter(p=>p.life>0);
  }
  draw();
  requestAnimationFrame(loop);
}

// ══════════════ DRAW ══════════════
function s(v){return v*SC;}
let sandTex=null;
function getSand(){
  if(sandTex)return sandTex;
  sandTex=document.createElement('canvas');sandTex.width=200;sandTex.height=200;
  const sc=sandTex.getContext('2d');
  sc.fillStyle='#e8c97a';sc.fillRect(0,0,200,200);
  sc.strokeStyle='rgba(180,140,60,0.18)';sc.lineWidth=3;
  for(let y=-20;y<220;y+=14){sc.beginPath();for(let x=0;x<=200;x+=4){const wy=y+Math.sin(x*0.08)*6;if(x===0)sc.moveTo(x,wy);else sc.lineTo(x,wy);}sc.stroke();}
  for(let i=0;i<300;i++){sc.fillStyle=`rgba(${160+Math.random()*40},${120+Math.random()*30},${50+Math.random()*20},0.15)`;sc.beginPath();sc.arc(Math.random()*200,Math.random()*200,Math.random()*2+0.5,0,Math.PI*2);sc.fill();}
  return sandTex;
}
function draw(){
  if(!G)return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#c8a855';ctx.fillRect(0,0,W,H);
  const pat=ctx.createPattern(getSand(),'repeat');
  ctx.save();ctx.beginPath();ctx.rect(s(ARENA.x),s(ARENA.y),s(ARENA.w),s(ARENA.h));ctx.clip();ctx.fillStyle=pat;ctx.scale(SC,SC);ctx.fillRect(ARENA.x,ARENA.y,ARENA.w,ARENA.h);ctx.restore();
  [[CAPZONE[0],'rgba(255,80,80,0.2)','rgba(255,80,80,0.6)'],[CAPZONE[1],'rgba(80,140,255,0.2)','rgba(80,140,255,0.6)']].forEach(([z,f,st])=>{ctx.fillStyle=f;ctx.fillRect(s(z.x),s(z.y),s(z.w),s(z.h));ctx.strokeStyle=st;ctx.lineWidth=s(2);ctx.setLineDash([s(5),s(4)]);ctx.strokeRect(s(z.x),s(z.y),s(z.w),s(z.h));ctx.setLineDash([]);});
  WALLS.forEach(w=>{const bw=12,isV=w.h>w.w;if(isV){let y=w.y;while(y<w.y+w.h){const h=Math.min(bw,w.y+w.h-y);drawSB(w.x,y,w.w,h);y+=bw+1;}}else{let x=w.x;while(x<w.x+w.w){const ww=Math.min(bw,w.x+w.w-x);drawSB(x,w.y,ww,w.h);x+=bw+1;}}});
  ctx.strokeStyle='#6b5a2a';ctx.lineWidth=s(5);ctx.strokeRect(s(ARENA.x),s(ARENA.y),s(ARENA.w),s(ARENA.h));
  [{x:ARENA.x,y:ARENA.y,fx:1,fy:1},{x:ARENA.x,y:ARENA.y+ARENA.h,fx:1,fy:-1},{x:ARENA.x+ARENA.w,y:ARENA.y,fx:-1,fy:1},{x:ARENA.x+ARENA.w,y:ARENA.y+ARENA.h,fx:-1,fy:-1}].forEach(b=>{ctx.strokeStyle='#5a4a1a';ctx.lineWidth=s(6);ctx.lineCap='square';ctx.beginPath();ctx.moveTo(s(b.x)+b.fx*s(70),s(b.y)+b.fy*s(8));ctx.lineTo(s(b.x)+b.fx*s(8),s(b.y)+b.fy*s(8));ctx.lineTo(s(b.x)+b.fx*s(8),s(b.y)+b.fy*s(50));ctx.stroke();});
  G.flags.forEach(f=>{if(f.held)return;ctx.save();ctx.translate(s(f.x),s(f.y));ctx.rotate(Math.PI/4);ctx.fillStyle=f.team===0?'#ff3333':'#3366ff';ctx.fillRect(-s(10),-s(10),s(20),s(20));ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(-s(2),-s(10),s(4),s(20));ctx.fillRect(-s(10),-s(2),s(20),s(4));ctx.strokeStyle='#fff';ctx.lineWidth=s(1.5);ctx.strokeRect(-s(10),-s(10),s(20),s(20));ctx.restore();});
  G.tanks.forEach(t=>{if(!t.caging)return;const sp=SPAWNS[t.team][t.id%2];ctx.fillStyle=t.team===0?'rgba(255,68,68,0.12)':'rgba(68,136,255,0.12)';ctx.fillRect(s(sp.x-22),s(sp.y-22),s(44),s(44));ctx.strokeStyle=t.team===0?'#ff4444':'#4488ff';ctx.lineWidth=s(2);ctx.setLineDash([s(4),s(3)]);ctx.strokeRect(s(sp.x-22),s(sp.y-22),s(44),s(44));ctx.setLineDash([]);ctx.fillStyle='#fff';ctx.font=`bold ${s(15)}px Arial Black`;ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=s(3);ctx.strokeText(Math.ceil(t.cageT),s(sp.x),s(sp.y+6));ctx.fillText(Math.ceil(t.cageT),s(sp.x),s(sp.y+6));});
  const me=G.tanks[mySlot];if(me&&me.alive&&!me.caging){ctx.strokeStyle='rgba(255,255,100,0.5)';ctx.lineWidth=s(2);ctx.setLineDash([s(5),s(3)]);ctx.beginPath();ctx.arc(s(me.x),s(me.y),s(TANK_R*1.8),0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  G.tanks.forEach(t=>{if(t.alive&&!t.caging)drawTank(t);});
  G.bullets.forEach(b=>{for(let i=1;i<=4;i++){ctx.fillStyle=`rgba(220,220,220,${0.12-i*0.025})`;ctx.beginPath();ctx.arc(s(b.x-b.vx*i*0.7),s(b.y-b.vy*i*0.7),s(BUL_R*0.6+i*0.3),0,Math.PI*2);ctx.fill();}ctx.save();ctx.translate(s(b.x),s(b.y));ctx.rotate(Math.atan2(b.vy,b.vx));ctx.fillStyle=b.team===0?'#ff6633':'#55aaff';ctx.beginPath();ctx.ellipse(0,0,s(BUL_R*1.6),s(BUL_R*0.6),0,0,Math.PI*2);ctx.fill();ctx.restore();});
  cctx.clearRect(0,0,CC.width,CC.height);
  G.confetti.forEach(p=>{cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.rot*Math.PI/180);cctx.fillStyle=p.color;cctx.globalAlpha=Math.min(1,p.life/30);cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cctx.restore();});
}
function drawSB(x,y,w,h){ctx.fillStyle='#c8924a';ctx.beginPath();ctx.roundRect(s(x),s(y),s(w),s(h),s(3));ctx.fill();ctx.fillStyle='rgba(255,200,120,0.4)';ctx.beginPath();ctx.roundRect(s(x+1),s(y+1),s(w-2),s(h*0.4),s(2));ctx.fill();ctx.strokeStyle='#8b5e2a';ctx.lineWidth=s(0.8);ctx.beginPath();ctx.roundRect(s(x),s(y),s(w),s(h),s(3));ctx.stroke();}
function drawTank(t){
  const rad=t.angle*Math.PI/180;
  ctx.save();ctx.translate(s(t.x),s(t.y));ctx.rotate(rad);
  const col=t.team===0?'#cc2222':'#2255cc',colL=t.team===0?'#ff5555':'#5588ff',colD=t.team===0?'#881111':'#113388';
  ctx.fillStyle=colD;ctx.fillRect(-s(TANK_R*0.85),-s(TANK_R*0.75),s(TANK_R*1.7),s(TANK_R*0.45));ctx.fillRect(-s(TANK_R*0.85),s(TANK_R*0.3),s(TANK_R*1.7),s(TANK_R*0.45));
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=s(1);
  for(let i=-TANK_R*0.7;i<TANK_R*0.8;i+=6){ctx.beginPath();ctx.moveTo(s(i),s(-TANK_R*0.75));ctx.lineTo(s(i),s(-TANK_R*0.3));ctx.stroke();ctx.beginPath();ctx.moveTo(s(i),s(TANK_R*0.3));ctx.lineTo(s(i),s(TANK_R*0.75));ctx.stroke();}
  ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(-s(TANK_R*0.7),-s(TANK_R*0.5),s(TANK_R*1.4),s(TANK_R),s(s(3)));ctx.fill();
  ctx.fillStyle=colL;ctx.beginPath();ctx.roundRect(-s(TANK_R*0.55),-s(TANK_R*0.38),s(TANK_R*0.7),s(TANK_R*0.35),s(2));ctx.fill();
  ctx.fillStyle=colD;ctx.beginPath();ctx.arc(0,0,s(TANK_R*0.42),0,Math.PI*2);ctx.fill();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,s(TANK_R*0.32),0,Math.PI*2);ctx.fill();
  ctx.fillStyle=colD;ctx.beginPath();ctx.roundRect(s(TANK_R*0.05),-s(3.5),s(TANK_R*0.85),s(7),s(2));ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.roundRect(s(TANK_R*0.75),-s(3),s(TANK_R*0.2),s(6),s(1));ctx.fill();
  if(t.hasFlag){const fc=t.team===0?'#4488ff':'#ff4444';ctx.fillStyle=fc;ctx.fillRect(-s(3),-s(TANK_R*1.4),s(2.5),s(TANK_R));ctx.beginPath();ctx.moveTo(-s(0.5),-s(TANK_R*1.4));ctx.lineTo(s(11),-s(TANK_R*1.15));ctx.lineTo(-s(0.5),-s(TANK_R*0.9));ctx.fill();}
  ctx.restore();
  if(t.hasFlag){ctx.strokeStyle=t.team===0?'rgba(68,136,255,0.5)':'rgba(255,68,68,0.5)';ctx.lineWidth=s(3);ctx.beginPath();ctx.arc(s(t.x),s(t.y),s(TANK_R*1.5),0,Math.PI*2);ctx.stroke();}
  ctx.fillStyle='#fff';ctx.font=`bold ${s(9)}px Arial Black`;ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=s(2);
  ctx.strokeText(`P${t.id+1}`,s(t.x),s(t.y-TANK_R-3));ctx.fillText(`P${t.id+1}`,s(t.x),s(t.y-TANK_R-3));
}
